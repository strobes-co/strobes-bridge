services:
  shell-agent:
    build: .
    image: strobes/shell-agent:latest
    container_name: strobes-shell-agent
    env_file:
      - .env
    environment:
      # Auto-provision the sandbox pack (nmap/nuclei/boto3/… ) on startup. Uses the
      # value from .env if set, otherwise the published pack release. Set
      # STROBES_PACK_DISABLE=1 in .env to use only host-installed tools.
      - STROBES_PACK_URL=${STROBES_PACK_URL:-https://github.com/strobes-co/strobes-bridge/releases/download/pack-v0.1.0}
    volumes:
      # Mount host workspace into container
      - ./workspace:/workspace
      # Persist the downloaded pack + bridge_id across restarts (avoids re-download)
      - pack-cache:/root/.strobes-shell-agent
    restart: unless-stopped
    # Override CMD if you need extra flags
    # command: ["connect", "--verbose"]

volumes:
  pack-cache:
