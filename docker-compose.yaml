services:
  shell-agent:
    build: .
    image: strobes/shell-agent:latest
    container_name: strobes-shell-agent
    env_file:
      - .env
    # The sandbox pack (nmap/nuclei/nuclei-templates/boto3/… ) is BAKED into the image
    # at build time (see Dockerfile) — no runtime download, works fully offline. Set
    # STROBES_PACK_DISABLE=1 in .env to ignore it and use only host-installed tools.
    volumes:
      # Mount host workspace into container
      - ./workspace:/workspace
      # Persist bridge_id (and any runtime state) across restarts
      - state:/root/.strobes-shell-agent
    restart: unless-stopped
    # Override CMD if you need extra flags
    # command: ["connect", "--verbose"]

volumes:
  state:
