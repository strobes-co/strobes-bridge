name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # macOS + Windows executables (no glibc floor). Linux is built separately in
  # manylinux_2_28 (see build-linux) so the binary runs on glibc >= 2.28.
  build-executables:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset_name: strobes-shell-agent-macos-arm64
            triple: macos-aarch64
            sep: ":"
            extra_args: ""
          - os: windows-latest
            asset_name: strobes-shell-agent-windows-amd64.exe
            triple: windows-x86_64
            sep: ";"
            # Bundle pywinpty's native ConPTY DLLs for the interactive terminal.
            extra_args: "--collect-all winpty"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Build the sandbox pack (internal-ad = default toolset) and embed its TARBALL into
      # the binary. At runtime the binary self-extracts it locally (offline) — no download.
      # Runners ship Rust + git; ubuntu/macOS/Windows ship a C compiler (aardwolf=Rust,
      # netifaces=C, Responder/enum4linux-ng=git).
      - name: Build sandbox pack (internal-ad)
        shell: bash
        run: |
          uv run --python 3.12 python sandbox_pack/build_pack.py \
            --profile internal-ad --out sandbox_pack/out --python-version 3.12 --tar

      - name: Build executable (pack embedded)
        run: |
          pyinstaller \
            --onefile \
            --name "${{ matrix.asset_name }}" \
            --add-data "sandbox_pack/out/strobes-sandbox-pack-internal-ad-${{ matrix.triple }}.tar.gz${{ matrix.sep }}." \
            --hidden-import=strobes_shell_agent \
            --hidden-import=strobes_shell_agent.executor \
            --hidden-import=strobes_shell_agent.client \
            --hidden-import=strobes_shell_agent.config \
            --hidden-import=strobes_shell_agent.pty_handler \
            ${{ matrix.extra_args }} \
            strobes_shell_agent/__main__.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}*

  # Linux binaries: run PyInstaller UNDER the python-build-standalone interpreter (from uv),
  # whose portable shared libpython links a very old glibc. So a binary built on the latest
  # runner still runs on glibc >= ~2.26 (validated on Amazon Linux 2, Rocky 8, Debian 12).
  # Building with the runner's own python would pin the binary to its glibc (2.39).
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            asset_name: strobes-shell-agent-linux-amd64
            triple: linux-x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm     # native arm64 runner → no QEMU
            asset_name: strobes-shell-agent-linux-arm64
            triple: linux-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (C + Rust + binutils + git for the internal-ad pack)
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils build-essential pkg-config libffi-dev git
          curl -LsSf https://astral.sh/uv/install.sh | sh
          curl -LsSf https://sh.rustup.rs | sh -s -- -y --profile minimal
      - name: Build binary (internal-ad, portable glibc)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          uv python install --install-dir "$PWD/py" 3.12
          PYBIN=$(ls "$PWD"/py/*/bin/python3 | head -1)
          # deps so PyInstaller can freeze; installed INTO the standalone python
          uv pip install --python "$PYBIN" --break-system-packages pyinstaller ".[dev]"
          uv run --python 3.12 python sandbox_pack/build_pack.py --profile internal-ad \
            --out sandbox_pack/out --python-version 3.12 --tar
          "$PYBIN" -m PyInstaller --onefile \
            --name "${{ matrix.asset_name }}" \
            --add-data "sandbox_pack/out/strobes-sandbox-pack-internal-ad-${{ matrix.triple }}.tar.gz:." \
            --hidden-import=strobes_shell_agent \
            --hidden-import=strobes_shell_agent.executor \
            --hidden-import=strobes_shell_agent.client \
            --hidden-import=strobes_shell_agent.config \
            --hidden-import=strobes_shell_agent.pty_handler \
            strobes_shell_agent/__main__.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}*

  # Build and push multi-arch Docker image
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

  # Create GitHub Release with all artifacts attached
  release:
    runs-on: ubuntu-latest
    needs: [build-executables, build-linux, build-docker]
    if: always() && needs.build-linux.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux amd64
        uses: actions/download-artifact@v4
        with:
          name: strobes-shell-agent-linux-amd64
          path: artifacts/

      - name: Download Linux arm64
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: strobes-shell-agent-linux-arm64
          path: artifacts/

      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: strobes-shell-agent-macos-arm64
          path: artifacts/

      - name: Download Windows amd64
        uses: actions/download-artifact@v4
        with:
          name: strobes-shell-agent-windows-amd64.exe
          path: artifacts/

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            artifacts/**/*
          body: |
            ## Installation

            ### Pre-built binaries (no Python needed)
            Download the binary for your platform below, make it executable, and run:
            ```bash
            chmod +x strobes-shell-agent-*
            ./strobes-shell-agent-linux-amd64 connect --url https://app.strobes.co --api-key YOUR_KEY --org-id YOUR_ORG
            ```

            | Platform | Binary |
            |---|---|
            | Linux x86_64 | `strobes-shell-agent-linux-amd64` |
            | Linux ARM64 | `strobes-shell-agent-linux-arm64` |
            | macOS Apple Silicon | `strobes-shell-agent-macos-arm64` |
            | Windows x86_64 | `strobes-shell-agent-windows-amd64.exe` |

            ### Docker (multi-arch: amd64 + arm64)
            ```bash
            docker run --rm --env-file .env ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} connect
            ```

            ### Docker Compose
            ```yaml
            services:
              shell-agent:
                image: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
                env_file: .env
                restart: unless-stopped
            ```

            ### From source
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd strobes-agent-shell
            pip install .
            strobes-shell-agent connect
            ```
