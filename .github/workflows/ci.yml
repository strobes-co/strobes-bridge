name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m py_compile strobes_shell_agent/cli.py strobes_shell_agent/client.py strobes_shell_agent/executor.py strobes_shell_agent/config.py strobes_shell_agent/pty_handler.py strobes_shell_agent/service.py

      - name: Import smoke test
        run: python -c "import strobes_shell_agent.cli, strobes_shell_agent.client, strobes_shell_agent.pty_handler, strobes_shell_agent.service; print('imports OK on', __import__('sys').platform)"

      - name: Subcommands smoke test
        run: |
          strobes-shell-agent --help
          strobes-shell-agent install-service --help
          strobes-shell-agent uninstall-service --help
          strobes-shell-agent status --help
          strobes-shell-agent stop --help
        shell: bash

      - name: CLI smoke test
        run: |
          strobes-shell-agent --version
          strobes-shell-agent connect --help
        shell: bash

      - name: Test
        run: pytest tests/ -v --tb=short || echo "No tests yet"
        shell: bash

  windows-binary:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build Windows binary
        run: |
          pyinstaller --onefile `
            --name strobes-shell-agent-windows-amd64 `
            --hidden-import=strobes_shell_agent `
            --hidden-import=strobes_shell_agent.executor `
            --hidden-import=strobes_shell_agent.client `
            --hidden-import=strobes_shell_agent.config `
            --hidden-import=strobes_shell_agent.pty_handler `
            --collect-all winpty `
            strobes_shell_agent/__main__.py

      - name: Verify binary runs
        run: |
          dist\strobes-shell-agent-windows-amd64.exe --version
          dist\strobes-shell-agent-windows-amd64.exe connect --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: strobes-shell-agent-windows-amd64
          path: dist/strobes-shell-agent-windows-amd64.exe

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t strobes/shell-agent:latest .

      - name: Verify image runs
        run: docker run --rm strobes/shell-agent:latest --version
