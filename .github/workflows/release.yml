name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build standalone executables for each platform
  build-executables:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: strobes-shell-agent-linux-amd64
            extra_args: ""
          - os: macos-latest
            asset_name: strobes-shell-agent-macos-arm64
            extra_args: ""
          - os: windows-latest
            asset_name: strobes-shell-agent-windows-amd64.exe
            # Bundle pywinpty's native ConPTY DLLs for the interactive terminal.
            extra_args: "--collect-all winpty"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build executable
        run: |
          pyinstaller \
            --onefile \
            --name "${{ matrix.asset_name }}" \
            --hidden-import=strobes_shell_agent \
            --hidden-import=strobes_shell_agent.executor \
            --hidden-import=strobes_shell_agent.client \
            --hidden-import=strobes_shell_agent.config \
            --hidden-import=strobes_shell_agent.pty_handler \
            ${{ matrix.extra_args }} \
            strobes_shell_agent/__main__.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}*

  # Build Linux ARM64 binary inside a native ARM64 Docker container
  build-linux-arm64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARM64 binary
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/src" -w /src \
            python:3.12-slim bash -c '
              apt-get update && apt-get install -y --no-install-recommends binutils && rm -rf /var/lib/apt/lists/*
              pip install --no-cache-dir ".[dev]"
              pyinstaller --onefile \
                --name strobes-shell-agent-linux-arm64 \
                --hidden-import=strobes_shell_agent \
                --hidden-import=strobes_shell_agent.executor \
                --hidden-import=strobes_shell_agent.client \
                --hidden-import=strobes_shell_agent.config \
                strobes_shell_agent/__main__.py
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: strobes-shell-agent-linux-arm64
          path: dist/strobes-shell-agent-linux-arm64*

  # Build and push multi-arch Docker image
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

  # Create GitHub Release with all artifacts attached
  release:
    runs-on: ubuntu-latest
    needs: [build-executables, build-linux-arm64, build-docker]
    if: always() && needs.build-executables.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux amd64
        uses: actions/download-artifact@v4
        with:
          name: strobes-shell-agent-linux-amd64
          path: artifacts/

      - name: Download Linux arm64
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: strobes-shell-agent-linux-arm64
          path: artifacts/

      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: strobes-shell-agent-macos-arm64
          path: artifacts/

      - name: Download Windows amd64
        uses: actions/download-artifact@v4
        with:
          name: strobes-shell-agent-windows-amd64.exe
          path: artifacts/

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            artifacts/**/*
          body: |
            ## Installation

            ### Pre-built binaries (no Python needed)
            Download the binary for your platform below, make it executable, and run:
            ```bash
            chmod +x strobes-shell-agent-*
            ./strobes-shell-agent-linux-amd64 connect --url https://app.strobes.co --api-key YOUR_KEY --org-id YOUR_ORG
            ```

            | Platform | Binary |
            |---|---|
            | Linux x86_64 | `strobes-shell-agent-linux-amd64` |
            | Linux ARM64 | `strobes-shell-agent-linux-arm64` |
            | macOS Apple Silicon | `strobes-shell-agent-macos-arm64` |
            | Windows x86_64 | `strobes-shell-agent-windows-amd64.exe` |

            ### Docker (multi-arch: amd64 + arm64)
            ```bash
            docker run --rm --env-file .env ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} connect
            ```

            ### Docker Compose
            ```yaml
            services:
              shell-agent:
                image: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
                env_file: .env
                restart: unless-stopped
            ```

            ### From source
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd strobes-agent-shell
            pip install .
            strobes-shell-agent connect
            ```
