name: Build Sandbox Packs

# Builds the self-contained "sandbox pack" (standalone Python runtime + agent packages +
# CLI security tools) for each platform and publishes the tarballs + a checksums file.
# Linux packs are built inside manylinux_2_28 containers so they run on glibc >= 2.28
# (RHEL/Rocky 8+, Ubuntu 20.04+, Debian 10+, Amazon Linux 2023).
#
# Trigger manually, or on a tag like `pack-v*`. The runtime daemon downloads these via
# STROBES_PACK_URL (see strobes_shell_agent/pack.py).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "sandbox_pack/**"
      - "strobes_shell_agent/pack.py"
      - ".github/workflows/build_sandbox_pack.yml"
  push:
    tags:
      - "pack-v*"

permissions:
  contents: write

jobs:
  linux:
    name: linux-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm   # native arm64 runner; falls back via qemu if unavailable
            image: quay.io/pypa/manylinux_2_28_aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Build pack in ${{ matrix.image }}
        run: |
          docker run --rm \
            -v "$PWD/sandbox_pack":/src:ro -v "$PWD/sandbox_pack/out":/out \
            ${{ matrix.image }} bash -lc '
              set -e
              export HOME=/root PATH=/root/.local/bin:$PATH
              curl -LsSf https://astral.sh/uv/install.sh | sh >/dev/null 2>&1
              uv run --python 3.12 python /src/build_pack.py --out /out \
                --requirements /src/sandbox-requirements.in \
                --manifest /src/tools.manifest.json \
                --python-version 3.12 --tar
            '
      - name: Validate pack (offline) on Rocky 8
        run: |
          PY=out/linux-${{ matrix.arch }}/python/*/bin/python3
          docker run --rm --network none \
            -v "$PWD/sandbox_pack":/w:ro rockylinux:8 bash -lc "
              \$(ls /w/$PY) /w/test_pack.py --pack /w/out/linux-${{ matrix.arch }} --skip-relocate
            "
      - name: Smoke-test bundled nmap on Alpine (musl, no glibc)
        run: |
          PACK=out/linux-${{ matrix.arch }}
          docker run --rm --network none -v "$PWD/sandbox_pack/$PACK":/p:ro alpine:3.19 sh -lc '
            NMAPDIR=/p/share/nmap/data /p/bin/nmap -sT -Pn -p 80 127.0.0.1 | grep -q "Nmap done"
          '
      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-pack-linux-${{ matrix.arch }}
          path: sandbox_pack/out/strobes-sandbox-pack-linux-${{ matrix.arch }}.tar.gz

  # Internal-network + Active Directory pack (impacket/nxc/certipy/responder/…). Needs a
  # C + Rust toolchain (netifaces, aardwolf); manylinux has gcc, we add git + rust. Linux
  # only for now — macOS/Windows AD builds (aardwolf Rust + netifaces) need runner validation.
  internal-ad-linux:
    name: internal-ad-linux-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            image: quay.io/pypa/manylinux_2_28_aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Build internal-ad pack in ${{ matrix.image }}
        run: |
          docker run --rm \
            -v "$PWD/sandbox_pack":/src:ro -v "$PWD/sandbox_pack/out":/out \
            ${{ matrix.image }} bash -lc '
              set -e
              command -v git >/dev/null || yum install -y git >/dev/null 2>&1
              export HOME=/root PATH=/root/.local/bin:/root/.cargo/bin:$PATH
              curl -LsSf https://astral.sh/uv/install.sh | sh >/dev/null 2>&1
              curl -LsSf https://sh.rustup.rs | sh -s -- -y --profile minimal >/dev/null 2>&1
              uv run --python 3.12 python /src/build_pack.py --profile internal-ad --out /out \
                --manifest /src/tools.manifest.json --python-version 3.12 --tar
            '
      - name: Validate internal-ad pack (offline) on Rocky 8
        run: |
          PACK=out/internal-ad-linux-${{ matrix.arch }}
          PY=$(ls sandbox_pack/$PACK/python/*/bin/python3)
          docker run --rm --network none -v "$PWD/sandbox_pack":/w:ro rockylinux:8 bash -lc "
            \$(ls /w/$PACK/python/*/bin/python3) /w/test_pack.py --pack /w/$PACK --skip-relocate
            for t in nxc certipy bloodhound-python responder enum4linux-ng; do
              /w/$PACK/python/*/bin/python3 -c 'import shutil,sys; sys.exit(0)' ;
            done
          "
      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-pack-internal-ad-linux-${{ matrix.arch }}
          path: sandbox_pack/out/strobes-sandbox-pack-internal-ad-linux-${{ matrix.arch }}.tar.gz

  native:
    name: ${{ matrix.triple }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: macos-aarch64
            runner: macos-14      # Apple silicon
          - triple: windows-x86_64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rosetta 2 (Apple Silicon — nmap is x86_64)
        if: matrix.triple == 'macos-aarch64'
        run: softwareupdate --install-rosetta --agree-to-license || true
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build pack
        shell: bash
        run: |
          uv run --python 3.12 python sandbox_pack/build_pack.py \
            --out sandbox_pack/out --python-version 3.12 --tar
      - name: Validate pack
        shell: bash
        run: |
          PACK=$(ls -d sandbox_pack/out/${{ matrix.triple }})
          PY=$(ls "$PACK"/python/*/bin/python3* 2>/dev/null | head -1 || ls "$PACK"/python/*/python.exe | head -1)
          "$PY" sandbox_pack/test_pack.py --pack "$PACK"
      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-pack-${{ matrix.triple }}
          path: sandbox_pack/out/strobes-sandbox-pack-${{ matrix.triple }}.tar.gz

  # Intel macs are a scarce, slow-to-schedule runner — kept OFF the publish gate so it
  # can't block the release. It self-appends its pack to the release whenever it runs.
  native-intel:
    name: macos-x86_64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build pack
        shell: bash
        run: |
          uv run --python 3.12 python sandbox_pack/build_pack.py \
            --out sandbox_pack/out --python-version 3.12 --tar
      - name: Validate pack
        shell: bash
        run: |
          PACK=sandbox_pack/out/macos-x86_64
          PY=$(ls "$PACK"/python/*/bin/python3* | head -1)
          "$PY" sandbox_pack/test_pack.py --pack "$PACK"
      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-pack-macos-x86_64
          path: sandbox_pack/out/strobes-sandbox-pack-macos-x86_64.tar.gz
      - name: Checksum + append to release
        if: startsWith(github.ref, 'refs/tags/pack-v')
        shell: bash
        run: |
          cd sandbox_pack/out
          shasum -a 256 strobes-sandbox-pack-macos-x86_64.tar.gz \
            > strobes-sandbox-pack-macos-x86_64.tar.gz.sha256
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/pack-v')
        with:
          files: |
            sandbox_pack/out/strobes-sandbox-pack-macos-x86_64.tar.gz
            sandbox_pack/out/strobes-sandbox-pack-macos-x86_64.tar.gz.sha256

  publish:
    needs: [linux, internal-ad-linux, native]
    runs-on: ubuntu-latest
    # Publish whatever packs built. !cancelled() lets a slow/failed leg (e.g. the scarce
    # Intel-mac runner) not sink the release; re-running that job later re-publishes it.
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/pack-v') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          for f in *.tar.gz; do sha256sum "$f" > "$f.sha256"; done
          ls -la
      - uses: softprops/action-gh-release@v2
        with:
          name: Sandbox packs ${{ github.ref_name }}
          body: |
            Self-contained bridge sandbox packs (standalone Python + agent packages +
            CLI tools: nmap, nuclei, httpx, ffuf, gobuster, subfinder, dnsx).

            The bridge auto-downloads the pack for its OS/arch on startup via
            `STROBES_PACK_URL=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}`.
            Each `*.tar.gz` has a matching `*.sha256` for integrity verification.
          files: |
            dist/*.tar.gz
            dist/*.sha256
